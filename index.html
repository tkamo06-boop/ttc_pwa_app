<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTC Color Manager</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TTC Manager">
<meta name="theme-color" content="#ff9900">

<script>var _V=Date.now();document.write('<link rel="stylesheet" href="css/app.css?v='+_V+'">')</script>
</head>
<body>
  

<div id="bootSplash" class="boot-splash">
  <div class="boot-inner">
    <img src="loading_img.png" class="boot-logo">
    <div class="boot-spinner"></div>
    <div class="boot-text">Loading…</div>
  </div>
</div>

<!-- ログイン画面 -->
<div id="loginScreen" class="login-screen" style="display:none">
  <div class="login-card">
    <img src="loading_img.png" class="login-logo">
    <div class="login-title">TTC Color Manager</div>
    <div class="login-subtitle">TWO THIN COATS</div>

    <div id="authError" class="auth-error"></div>

    <form id="authForm">
      <input type="email" id="authEmail" data-i18n-placeholder="email_placeholder" placeholder="Email address" autocomplete="email" required>
      <div class="password-wrap">
        <input type="password" id="authPassword" data-i18n-placeholder="password_placeholder" placeholder="Password (6+ characters)" autocomplete="current-password" required>
        <button type="button" id="togglePassword" class="password-eye" data-i18n-aria="toggle_password_aria" aria-label="Show password">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="remember-wrap">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe" class="remember-text" data-i18n="remember_me">Remember email</label>
      </div>
      <button type="submit" id="authSubmitBtn" class="auth-btn-primary" data-i18n="login_btn">Log In</button>
    </form>

    <p id="forgotPasswordWrap" class="forgot-password-wrap">
      <a href="#" id="forgotPasswordLink" data-i18n="forgot_password">Forgot your password?</a>
    </p>

    <div class="auth-divider"><span data-i18n="or_divider">or</span></div>

    <button id="googleSignInBtn" class="auth-btn-google" data-i18n="google_signin">Sign in with Google</button>

    <p class="auth-switch">
      <span class="auth-switch-text" data-i18n="no_account">Don't have an account?</span>
      <a href="#" id="authModeToggle" data-i18n="register_link">Sign Up</a>
    </p>
  </div>
</div>

<!-- メインアプリ -->
<div id="mainApp" style="display:none">

  <div class="app-header">
    <div class="title-row">
      <span>TWO THIN COATS</span>
      <span id="progressText">0%</span>
      <button id="logoutBtn" class="logout-btn" data-i18n="logout_btn">Log Out</button>
    </div>
    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>
    <div class="type-filter">
      <div class="type-chips">
        <button class="chip active" onclick="App.setType('all', this)">All</button>
        <button class="chip" onclick="App.setType('shadow', this)">Shadow</button>
        <button class="chip" onclick="App.setType('midtone', this)">Mid</button>
        <button class="chip" onclick="App.setType('highlight', this)">Hi</button>
        <button class="chip" onclick="App.setType('metallic', this)">Metal</button>
        <button class="chip" onclick="App.setType('wash', this)">Wash</button>
        <button class="chip" onclick="App.setType('bright', this)">Bright</button>
        <button class="chip" onclick="App.setType('glaze', this)">Glaze</button>
        <button class="chip" onclick="App.setType('effect', this)">Effect</button>
      </div>
    </div>
  </div>

  <ul id="colorList"></ul>

  <footer class="app-footer">
    Provided by <strong>things and craft Inc</strong><br>
    Official Japanese Distributor of TWO THIN COATS
  </footer>

  <div class="bottom-nav">
    <button class="wave-btn active" data-wave="all">All</button>
    <button class="wave-btn" data-wave="WAVE1">W1</button>
    <button class="wave-btn" data-wave="WAVE2">W2</button>
    <button class="wave-btn" data-wave="WAVE3">W3</button>
  </div>

</div><!-- /mainApp -->

<!-- 販売店一覧画面 -->
<div id="storeScreen" class="store-screen" style="display:none">
  <div class="store-header">
    <button id="storeBackBtn" class="store-back-btn">&#8592;</button>
    <span class="store-title" data-i18n="store_title">Retailers</span>
  </div>
  <div id="storeLocating" class="store-locating" data-i18n="store_locating">Getting your location…</div>
  <ul id="storeList" class="store-list"></ul>
</div>

<div id="confirmSheet" class="confirm-sheet">
  <div class="confirm-body">
    <p class="confirm-msg"></p>
    <button id="confirmOk" class="confirm-btn-ok" data-i18n="confirm_ok">Remove</button>
    <button id="confirmCancel" class="confirm-btn-cancel" data-i18n="confirm_cancel">Cancel</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-analytics-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
['js/i18n.js','js/data.js','js/app.js','js/firebase.js','js/firestore.js','js/stores.js'].forEach(function(s){
  document.write('<script src="'+s+'?v='+_V+'"><\/script>');
});
</script>
</body>
</html>
